<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swifthaus | Smart Home</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --accent: #007AFF; /* Apple-style Blue */
            --glass: rgba(255, 255, 255, 0.7);
            --text: #1d1d1f;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .swifthaus-app {
            width: 380px;
            height: 700px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        header h1 { font-size: 24px; margin: 0; font-weight: 700; }
        header p { font-size: 14px; opacity: 0.6; margin: 5px 0 30px 0; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Smart Device Tiles */
        .tile {
            background: white;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tile.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        .tile-icon { font-size: 24px; }
        .tile-name { font-weight: 600; font-size: 15px; }

        /* Temperature Slider */
        .temp-control {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
        }

        input[type=range] {
            width: 100%;
            margin-top: 15px;
        }

        .status-pill {
            margin-top: auto;
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="swifthaus-app">
        <header>
            <h1>Swifthaus</h1>
            <p>Welcome back, Guest</p>
        </header>

        <div class="grid">
            <div class="tile active" onclick="this.classList.toggle('active')">
                <span class="tile-icon">💡</span>
                <span class="tile-name">Living Room</span>
            </div>
            <div class="tile" onclick="this.classList.toggle('active')">
                <span class="tile-icon">❄️</span>
                <span class="tile-name">AC Unit</span>
            </div>
            <div class="tile active" onclick="this.classList.toggle('active')">
                <span class="tile-icon">🔒</span>
                <span class="tile-name">Main Door</span>
            </div>
            <div class="tile" onclick="this.classList.toggle('active')">
                <span class="tile-icon">🎵</span>
                <span class="tile-name">Speakers</span>
            </div>
        </div>

        <div class="temp-control">
            <span style="font-size: 12px; font-weight: bold; opacity: 0.5;">TEMPERATURE</span>
            <div style="font-size: 32px; font-weight: bold;">22°C</div>
            <input type="range" min="16" max="30" value="22">
        </div>

        <div class="status-pill">
            <span>Home Status</span>
            <span style="color: green; font-weight: bold;">● SECURE</span>
        </div>
    </div>

</body>
</html>
